<!doctype html>
<html lang="en">
  <head>
    <title>Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body>
    <header>
      <nav>
        <a class="page-links" href="../index.html">Google Search</a>
      </nav>
    </header>
    <main>
      <form
        action="https://www.google.com/search"
        id="search-form"
        autocomplete="off"
      >
        <h1 class="main-title">Google Images</h1>
        <input type="text" name="q" />

        <!-- tmb=isch is whats used to redirect to images -->
        <input type="text" name="tbm" value="isch" hidden />

        <div>
          <input
            type="submit"
            aria-label="google search"
            name="btnK"
            value="Google Search"
          />
        </div>
      </form>
    </main>
  </body>
</html>
